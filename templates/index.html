<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeteoGalle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(255, 210, 0, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 180, 0, 0.03) 0%, transparent 50%);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    color: #f0f0f0;
  }

  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 6px;
    color: #444;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .logo span {
    color: #FFD700;
    text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
  }

  form {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 48px;
  }

  input {
    flex: 1;
    padding: 14px 18px;
    border-radius: 6px;
    border: 1px solid #222;
    font-size: 15px;
    background: #111;
    color: #f0f0f0;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input::placeholder { color: #333; }

  input:focus {
    border-color: rgba(255, 215, 0, 0.4);
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.08);
  }

  button {
    padding: 14px 20px;
    border-radius: 6px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    background: transparent;
    color: #FFD700;
    font-size: 16px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
  }

  button:hover {
    background: rgba(255, 215, 0, 0.06);
    border-color: rgba(255, 215, 0, 0.6);
    box-shadow: 0 0 16px rgba(255, 215, 0, 0.1);
  }

  .error {
    color: #555;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 40px 32px;
    background: #0f0f0f;
    box-shadow:
      0 0 40px rgba(255, 215, 0, 0.04),
      inset 0 1px 0 rgba(255, 215, 0, 0.05);
  }

  .ciudad {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    color: #FFD700;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }

  .pais {
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .icono {
    width: 64px;
    height: 64px;
    opacity: 0.9;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.2));
  }

  .temperatura {
    font-size: 96px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    margin-bottom: 12px;
    color: #f0f0f0;
  }

  .descripcion {
    font-size: 11px;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .detalles {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid #1a1a1a;
    padding-top: 32px;
  }

  .detalle-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 16px;
    border-right: 1px solid #1a1a1a;
  }

  .detalle-item:last-child { border-right: none; }

  .detalle-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
  }

  .detalle-valor {
    font-size: 28px;
    font-weight: 300;
    color: #FFD700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
  }

  .detalle-unidad {
    font-size: 10px;
    color: #2a2a2a;
    letter-spacing: 1px;
  }

  .footer {
    margin-top: 48px;
    font-size: 10px;
    color: #1f1f1f;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

<div class="logo">Meteo<span>Galle</span></div>

<form method="POST">
  <input type="text" name="ciudad" placeholder="Ciudad..." required autofocus>
  <button type="submit">→</button>
</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if clima %}
<div class="card">
  <div class="ciudad">{{ clima.ciudad }}</div>
  <div class="pais">{{ clima.pais }}</div>
  <img class="icono" src="https://openweathermap.org/img/wn/{{ clima.icono }}@2x.png" alt="{{ clima.descripcion }}">
  <div class="temperatura">{{ clima.temperatura }}°</div>
  <div class="descripcion">{{ clima.descripcion }}</div>
  <div class="detalles">
    <div class="detalle-item">
      <span class="detalle-label">Sensación</span>
      <span class="detalle-valor">{{ clima.sensacion }}°</span>
      <span class="detalle-unidad">Celsius</span>
    </div>
    <div class="detalle-item">
      <span class="detalle-label">Humedad</span>
      <span class="detalle-valor">{{ clima.humedad }}%</span>
      <span class="detalle-unidad">Relativa</span>
    </div>
    <div class="detalle-item">
      <span class="detalle-label">Viento</span>
      <span class="detalle-valor">{{ clima.viento }}</span>
      <span class="detalle-unidad">km/h</span>
    </div>
  </div>
</div>
{% endif %}

<div class="footer">METEOGALLE · 2026</div>

</body>
</html>
