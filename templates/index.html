<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeteoGalle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    color: #f0f0f0;
  }

  .logo {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 6px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 60px;
  }

  .logo span { color: #f0f0f0; }

  form {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 48px;
  }

  input {
    flex: 1;
    padding: 14px 18px;
    border-radius: 6px;
    border: 1px solid #222;
    font-size: 15px;
    background: #141414;
    color: #f0f0f0;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }

  input::placeholder { color: #444; }
  input:focus { border-color: #444; }

  button {
    padding: 14px 20px;
    border-radius: 6px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #f0f0f0;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #222; }

  .error {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .ciudad {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .pais {
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .icono {
    width: 64px;
    height: 64px;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  .temperatura {
    font-size: 96px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    margin-bottom: 12px;
  }

  .descripcion {
    font-size: 13px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .detalles {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-top: 1px solid #1a1a1a;
    padding-top: 32px;
  }

  .detalle-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 16px;
    border-right: 1px solid #1a1a1a;
  }

  .detalle-item:last-child { border-right: none; }

  .detalle-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #333;
    text-transform: uppercase;
  }

  .detalle-valor {
    font-size: 28px;
    font-weight: 300;
    color: #f0f0f0;
  }

  .detalle-unidad {
    font-size: 10px;
    color: #333;
    letter-spacing: 1px;
  }

  .footer {
    margin-top: 80px;
    font-size: 11px;
    color: #222;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="logo">Meteo<span>Galle</span></div>

<form method="POST">
  <input type="text" name="ciudad" placeholder="Ciudad..." required autofocus>
  <button type="submit">→</button>
</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if clima %}
<div class="card">
  <div class="ciudad">{{ clima.ciudad }}</div>
  <div class="pais">{{ clima.pais }}</div>
  <img class="icono" src="https://openweathermap.org/img/wn/{{ clima.icono }}@2x.png" alt="{{ clima.descripcion }}">
  <div class="temperatura">{{ clima.temperatura }}°</div>
  <div class="descripcion">{{ clima.descripcion }}</div>
  <div class="detalles">
    <div class="detalle-item">
      <span class="detalle-label">Sensación</span>
      <span class="detalle-valor">{{ clima.sensacion }}°</span>
      <span class="detalle-unidad">Celsius</span>
    </div>
    <div class="detalle-item">
      <span class="detalle-label">Humedad</span>
      <span class="detalle-valor">{{ clima.humedad }}%</span>
      <span class="detalle-unidad">Relativa</span>
    </div>
    <div class="detalle-item">
      <span class="detalle-label">Viento</span>
      <span class="detalle-valor">{{ clima.viento }}</span>
      <span class="detalle-unidad">km/h</span>
    </div>
  </div>
</div>
{% endif %}

<div class="footer">METEOGALLE · {{ 2026 }}</div>

</body>
</html>
